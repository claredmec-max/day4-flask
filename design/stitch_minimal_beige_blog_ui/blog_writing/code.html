<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Write - BlogBoard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#303221",
                    "surface-dim": "#dbdcc3",
                    "on-surface-variant": "#534340",
                    "on-secondary-fixed": "#291806",
                    "tertiary": "#645647",
                    "surface-container": "#efefd7",
                    "primary-container": "#a65d50",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#ffdad4",
                    "on-tertiary-fixed-variant": "#524436",
                    "surface": "#fbfbe2",
                    "surface-container-high": "#eaead1",
                    "surface-bright": "#fbfbe2",
                    "primary": "#89453a",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#795f49",
                    "on-primary-fixed-variant": "#723429",
                    "outline": "#86736f",
                    "tertiary-container": "#7e6e5e",
                    "on-background": "#1b1d0e",
                    "primary-fixed-dim": "#ffb4a6",
                    "on-tertiary-container": "#fff4ed",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f5f5dc",
                    "secondary": "#725a43",
                    "surface-tint": "#8f4b3f",
                    "inverse-primary": "#ffb4a6",
                    "on-primary-fixed": "#3a0a04",
                    "on-primary-container": "#fff5f3",
                    "surface-container-highest": "#e4e4cc",
                    "secondary-fixed-dim": "#e1c1a5",
                    "on-surface": "#1b1d0e",
                    "secondary-container": "#ffdcbf",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#241a0e",
                    "inverse-on-surface": "#f2f2d9",
                    "secondary-fixed": "#ffdcbf",
                    "tertiary-fixed-dim": "#d7c3b0",
                    "outline-variant": "#d9c1bd",
                    "on-secondary-fixed-variant": "#59422d",
                    "error": "#ba1a1a",
                    "surface-variant": "#e4e4cc",
                    "tertiary-fixed": "#f4dfcb",
                    "on-error": "#ffffff",
                    "background": "#fbfbe2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "container-max": "720px",
                    "base": "4px",
                    "sm": "8px",
                    "xs": "4px",
                    "lg": "24px",
                    "gutter": "20px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "headline-xl": ["Be Vietnam Pro"],
                    "label-sm": ["Be Vietnam Pro"],
                    "label-md": ["Be Vietnam Pro"],
                    "headline-md": ["Be Vietnam Pro"],
                    "body-lg": ["Be Vietnam Pro"],
                    "headline-lg": ["Be Vietnam Pro"],
                    "body-md": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "headline-xl": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.25", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #FAF9F6;
        }
    </style>
</head>
<body class="font-body-md text-on-surface flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-[#F5F5DC] dark:bg-stone-900 border-b border-[#EADDCA] dark:border-stone-800 shadow-[0px_4px_12px_rgba(60,52,49,0.05)] sticky top-0 z-50 w-full">
<div class="flex justify-between items-center max-w-[720px] mx-auto px-6 py-4">
<div class="text-xl font-bold tracking-tighter text-[#A65D50] dark:text-orange-300 font-headline-md">
                BlogBoard
            </div>
<nav class="hidden md:flex items-center gap-6">
<a class="text-[#8E735B] hover:text-[#A65D50] transition-colors font-['Be_Vietnam_Pro'] text-sm tracking-tight" href="#">List</a>
<a class="text-[#8E735B] hover:text-[#A65D50] transition-colors font-['Be_Vietnam_Pro'] text-sm tracking-tight" href="#">Archive</a>
<div class="flex items-center gap-4 ml-2">
<button class="material-symbols-outlined text-[#8E735B] hover:bg-[#A65D50]/5 p-2 rounded-full transition-all duration-200 active:scale-95" data-icon="search">search</button>
<button class="material-symbols-outlined text-[#8E735B] hover:bg-[#A65D50]/5 p-2 rounded-full transition-all duration-200 active:scale-95" data-icon="settings">settings</button>
<button class="bg-[#A65D50] text-white px-5 py-2 rounded-lg font-label-md hover:brightness-90 active:scale-95 transition-all">Write</button>
</div>
</nav>
<div class="md:hidden flex items-center gap-2">
<button class="material-symbols-outlined text-[#8E735B]" data-icon="search">search</button>
<button class="material-symbols-outlined text-[#8E735B]" data-icon="settings">settings</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow max-w-[720px] w-full mx-auto px-6 pt-12 pb-24">
<!-- Header Section -->
<div class="mb-10 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 text-[#8E735B] hover:bg-[#A65D50]/5 rounded-full transition-all active:scale-90" title="Back to drafts">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-label-md text-[#8E735B] tracking-widest uppercase">초안 작성 중</span>
</div>
<div class="flex items-center gap-3">
<span class="text-xs font-label-sm text-[#8E735B]/60 italic">2분 전 저장됨</span>
</div>
</div>
<!-- Editor Surface -->
<section class="bg-[#F5F5DC] rounded-xl shadow-[0px_4px_12px_rgba(60,52,49,0.05)] border border-[#EADDCA]/50 p-8 md:p-12">
<!-- Title Input -->
<div class="mb-8">
<input class="w-full bg-transparent border-none p-0 text-headline-lg font-headline-lg text-on-surface focus:ring-0 placeholder:text-on-surface-variant/30 transition-all" placeholder="마음을 움직이는 제목을 입력하세요..." type="text"/>
<div class="h-px w-16 bg-[#A65D50]/20 mt-4"></div>
</div>
<!-- Content Area -->
<div class="relative">
<textarea class="w-full min-h-[400px] bg-transparent border-none p-0 text-body-lg font-body-lg text-on-surface focus:ring-0 placeholder:text-on-surface-variant/30 resize-none leading-relaxed" placeholder="이야기를 시작하세요. 단어에 집중하면 배경은 서서히 사라집니다..."></textarea>
<!-- Floating Toolbar Mock (Minimalist) -->
<div class="mt-8 pt-8 border-t border-[#EADDCA]/30 flex flex-wrap gap-4 items-center">
<button class="flex items-center gap-2 text-[#8E735B] hover:text-[#A65D50] font-label-sm transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="image">image</span>
<span>이미지 추가</span>
</button>
<button class="flex items-center gap-2 text-[#8E735B] hover:text-[#A65D50] font-label-sm transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="format_quote">format_quote</span>
<span>인용구</span>
</button>
<button class="flex items-center gap-2 text-[#8E735B] hover:text-[#A65D50] font-label-sm transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="link">link</span>
<span>하이퍼링크</span>
</button>
<div class="ml-auto flex items-center gap-2 text-[#8E735B]/50 font-label-sm">
<span class="material-symbols-outlined text-sm" data-icon="history_edu">history_edu</span>
<span>124 단어</span>
</div>
</div>
</div>
</section>
<!-- Final Action Area -->
<div class="mt-12 flex justify-end items-center gap-6">
<button class="text-[#8E735B] font-label-md hover:text-[#A65D50] underline underline-offset-8 decoration-[#EADDCA] transition-all">미리보기</button>
<button class="bg-[#A65D50] text-white px-10 py-4 rounded-xl font-headline-md shadow-lg shadow-[#A65D50]/20 hover:brightness-95 hover:-translate-y-0.5 active:scale-95 transition-all">발행하기</button>
</div>
</main>
<!-- Footer -->
<footer class="bg-transparent border-t border-[#EADDCA]/30 dark:border-stone-800/30 mt-auto w-full">
<div class="max-w-[720px] mx-auto py-12 px-6 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="font-['Be_Vietnam_Pro'] text-xs uppercase tracking-widest text-[#8E735B] dark:text-stone-500">
                © 2024 BlogBoard. Curated with intentionality.
            </div>
<div class="flex gap-6">
<a class="font-['Be_Vietnam_Pro'] text-xs uppercase tracking-widest text-[#8E735B] hover:text-[#A65D50] underline underline-offset-4 transition-opacity" href="#">Privacy</a>
<a class="font-['Be_Vietnam_Pro'] text-xs uppercase tracking-widest text-[#8E735B] hover:text-[#A65D50] underline underline-offset-4 transition-opacity" href="#">Terms</a>
<a class="font-['Be_Vietnam_Pro'] text-xs uppercase tracking-widest text-[#8E735B] hover:text-[#A65D50] underline underline-offset-4 transition-opacity" href="#">RSS Feed</a>
</div>
</div>
</footer>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full rounded-t-2xl z-50 bg-[#F5F5DC]/95 dark:bg-stone-900/95 backdrop-blur-md border-t border-[#EADDCA] dark:border-stone-800 shadow-[0px_-4px_12px_rgba(60,52,49,0.05)] md:hidden">
<div class="flex justify-around items-center h-16 px-4">
<div class="flex flex-col items-center justify-center text-[#8E735B] opacity-70 hover:opacity-100 active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Feed</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#A65D50]/10 text-[#A65D50] rounded-xl px-4 py-1 active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Write</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8E735B] opacity-70 hover:opacity-100 active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="bookmarks">bookmarks</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Library</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8E735B] opacity-70 hover:opacity-100 active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Profile</span>
</div>
</div>
</nav>
</body></html>
